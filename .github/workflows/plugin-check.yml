name: Plugin Check

on:
    pull_request:
        branches: [main]
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read

jobs:
    plugin-check:
        name: Run WordPress Plugin Check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: wordpress/plugin-check-action@v1
              with:
                  wp-version: latest
